name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to VPS
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          rsync -avzh --progress \
            -e "ssh -i deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/framework/cache/' \
            --exclude='storage/logs/' \
            --exclude='.composer/' \
            --exclude='.ash_history' \
            ./site/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/site/
          rm deploy_key
      
      - name: Clear Statamic cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            podman exec ${{ secrets.CONTAINER_NAME }} php please stache:clear
            podman exec ${{ secrets.CONTAINER_NAME }} php please cache:clear
