name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "site/*"
          target: ${{ secrets.VPS_PATH }}
          strip_components: 1
          rm: true
          excludes: ".env,.env.*,node_modules/*,vendor/*,storage/framework/cache/*"
      
      - name: Clear Statamic cache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            podman exec ${{ secrets.CONTAINER_NAME }} php please stache:clear
            podman exec ${{ secrets.CONTAINER_NAME }} php please cache:clear
