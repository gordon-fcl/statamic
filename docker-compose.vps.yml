version: '3.8'

services:
  statamic-app:
    build: .
    container_name: statamic_app
    restart: always
    userns_mode: "keep-id"
    volumes:
      - ./site:/var/www/html
    networks:
      - web-stack

  statamic-web:
    image: nginx:alpine
    container_name: statamic_web
    restart: always
    userns_mode: "keep-id"
    ports:
      - "8080:80"
    volumes:
      - ./site:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - statamic-app
    networks:
      - web-stack

networks:
  web-stack:
    external: true
