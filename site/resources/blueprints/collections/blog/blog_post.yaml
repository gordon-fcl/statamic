title: Blog Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
          -
            handle: date
            field:
              type: date
              required: true
              default: now
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
          -
            handle: content
            field:
              type: bard
              required: true
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - quote
                - link
                - table
              link_noopener: true
              link_noreferrer: true
              target_blank: true
