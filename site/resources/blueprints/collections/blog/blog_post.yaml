title: Blog Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
          -
            handle: date
            field:
              type: date
              required: true
              default: now
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
          -
            handle: content
            field:
              type: markdown
              required: true
