title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: slug
            field:
              type: slug
              required: true
              from: title
          -
            handle: template
            field:
              type: template
              display: Template
          -
            handle: hero_title
            field:
              type: text
              display: Hero Title
          -
            handle: hero_subtitle
            field:
              type: text
              display: Hero Subtitle
          -
            handle: featured_image
            field:
              type: assets
              display: Featured Image
              max_files: 1
              container: assets
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true