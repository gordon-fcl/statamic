title: Post
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: slug
            field:
              type: slug
              required: true
              from: title
          -
            handle: date
            field:
              type: date
              required: true
              default: now
          -
            handle: author
            field:
              type: text
              display: Author
          -
            handle: excerpt
            field:
              type: textarea
              display: Excerpt
              instructions: Brief post summary
          -
            handle: featured_image
            field:
              type: assets
              display: Featured Image
              max_files: 1
              container: assets
          -
            handle: tags
            field:
              type: tags
              display: Tags
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true