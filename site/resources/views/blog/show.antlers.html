<article class="bg-white py-16">
  <div class="max-w-4xl mx-auto px-6">
    <a href="/insights" class="inline-flex items-center text-gray-600 hover:text-gray-900 mb-8 transition-colors">
      <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      Back to Insights
    </a>
    
    <header class="mb-12">
      <time class="text-gray-500 text-sm">{{ date format="F j, Y" }}</time>
      <h1 class="text-5xl md:text-6xl font-bold text-gray-900 mt-4 mb-6">{{ title }}</h1>
      {{ if excerpt }}
      <p class="text-xl text-gray-600 leading-relaxed">{{ excerpt }}</p>
      {{ /if }}
    </header>
    
    <div class="prose prose-lg max-w-none prose-table:table prose-table:table-zebra prose-table:w-full prose-thead:bg-base-200 prose-th:text-left prose-th:font-semibold prose-th:px-4 prose-th:py-3 prose-td:px-4 prose-td:py-3">
      {{ content }}
    </div>
  </div>
</article>

<script>
  // Open external links in new tab
  document.querySelectorAll('article a[href^="http"]').forEach(link => {
    if (!link.href.includes(window.location.hostname)) {
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
    }
  });
</script>
