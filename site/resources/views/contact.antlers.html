<section class="bg-white py-16">
  <div class="max-w-4xl mx-auto px-6">
    <header class="mb-12">
      <h1 class="text-5xl md:text-6xl font-bold text-gray-900 mb-6">Get In Touch</h1>
      <p class="text-xl text-gray-600">Ready to leverage fifteen years of battle-tested experience? Let's discuss your technology challenges.</p>
    </header>
    
    <form action="/!/forms/contact" method="POST" class="space-y-6">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-900 mb-2">Name</label>
        <input type="text" id="name" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
      </div>
      
      <div>
        <label for="email" class="block text-sm font-medium text-gray-900 mb-2">Email</label>
        <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
      </div>
      
      <div>
        <label for="company" class="block text-sm font-medium text-gray-900 mb-2">Company (optional)</label>
        <input type="text" id="company" name="company" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent">
      </div>
      
      <div>
        <label for="message" class="block text-sm font-medium text-gray-900 mb-2">Message</label>
        <textarea id="message" name="message" rows="6" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-900 focus:border-transparent"></textarea>
      </div>
      
      <button type="submit" class="w-full md:w-auto bg-gray-900 text-white px-8 py-4 rounded-lg text-lg font-semibold hover:bg-gray-800 transition-colors">
        Send Message
      </button>
    </form>
  </div>
</section>
