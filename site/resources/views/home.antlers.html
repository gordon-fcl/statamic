<div class="hero min-h-screen bg-primary">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="text-5xl font-bold text-primary-content">{{ title }}</h1>
      <p class="py-6 text-primary-content/80">{{ intro }}</p>
      <a href="/contact" class="btn btn-secondary btn-lg">Get Started</a>
    </div>
  </div>
</div>

<section class="py-16">
  <div class="container mx-auto px-4">
    <h2 class="text-3xl font-bold text-center mb-12">Our Services</h2>
    <div class="grid md:grid-cols-3 gap-8">
      {{ services }}
      <div class="card bg-base-100 shadow-xl">
        <div class="card-body">
          <h3 class="card-title">{{ title }}</h3>
          <p>{{ description }}</p>
          <div class="card-actions justify-end">
            <div class="badge badge-primary">{{ category }}</div>
          </div>
        </div>
      </div>
      {{ /services }}
    </div>
  </div>
</section>
