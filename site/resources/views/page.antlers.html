<section class="py-20 relative">
  <div class="absolute inset-0 bg-gradient-to-br from-transparent via-[#2c5f7a]/5 to-transparent"></div>
  <div class="relative max-w-4xl mx-auto px-4">
    <h1 class="text-4xl font-bold mb-6 bg-gradient-to-r from-[#1a3e52] to-[#2c5f7a] bg-clip-text text-transparent">{{ title }}</h1>
    {{ if hero_subtitle }}
    <p class="text-xl text-gray-600 mb-12">{{ hero_subtitle }}</p>
    {{ /if }}
    <div class="prose prose-lg max-w-none">
      {{ content }}
    </div>
  </div>
</section>
