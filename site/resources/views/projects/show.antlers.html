<section class="py-20 relative">
  <div class="absolute inset-0 bg-gradient-to-br from-transparent via-[#2c5f7a]/5 to-transparent"></div>
  <div class="relative max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    {{# Header #}}
    <div class="mb-12">
      {{ if client_logo }}
      <div class="mb-6">
        <img src="{{ client_logo }}" alt="{{ title }}" class="h-12 w-auto">
      </div>
      {{ /if }}
      <div class="flex items-center gap-4 mb-4">
        <span class="text-sm font-medium text-[#2c5f7a]">{{ client_sector }}</span>
        <span class="text-sm text-gray-500">{{ project_role }}</span>
      </div>
      <h1 class="text-4xl font-bold mb-6 bg-gradient-to-r from-[#1a3e52] to-[#2c5f7a] bg-clip-text text-transparent">{{ title }}</h1>
      <p class="text-xl text-gray-600">{{ excerpt }}</p>
      <div class="flex flex-wrap gap-2 mt-6">
        {{ tech_stack }}
        <span class="text-xs px-3 py-1 rounded-full bg-[#1a3e52]/10 text-[#1a3e52] font-medium">{{ value }}</span>
        {{ /tech_stack }}
      </div>
    </div>

    {{# Content #}}
    <div class="prose prose-lg max-w-none">
      {{ content }}
    </div>

    {{# Back Link #}}
    <div class="mt-12 pt-8 border-t border-gray-200">
      <a href="/work" class="inline-flex items-center text-[#1a3e52] hover:text-[#2c5f7a] transition-smooth font-medium">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Work
      </a>
    </div>
  </div>
</section>
