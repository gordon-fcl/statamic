<div class="hero bg-primary py-24">
  <div class="hero-content text-center">
    <div class="max-w-2xl">
      <h1 class="text-4xl font-bold text-primary-content">{{ title }}</h1>
      <p class="py-6 text-primary-content/80">{{ client }} • {{ date format="Y" }}</p>
    </div>
  </div>
</div>

<section class="py-16">
  <div class="container mx-auto px-4 max-w-4xl">
    <div class="grid lg:grid-cols-3 gap-12">
      <div class="lg:col-span-2">
        <div class="prose max-w-none">
          {{ content }}
        </div>
      </div>
      
      <div class="space-y-6">
        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h3 class="card-title">Project Details</h3>
            <div class="divider"></div>
            <div class="space-y-2">
              <div><strong>Client:</strong> {{ client }}</div>
              <div><strong>Duration:</strong> {{ duration }}</div>
              <div><strong>Team Size:</strong> {{ team_size }}</div>
            </div>
          </div>
        </div>
        
        <div class="card bg-base-100 shadow-xl">
          <div class="card-body">
            <h3 class="card-title">Technologies</h3>
            <div class="divider"></div>
            <div class="flex flex-wrap gap-2">
              {{ technologies }}
              <div class="badge badge-primary">{{ value }}</div>
              {{ /technologies }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
