<div class="hero bg-primary py-24">
  <div class="hero-content text-center">
    <div class="max-w-md">
      <h1 class="text-4xl font-bold text-primary-content">{{ title }}</h1>
      <p class="py-6 text-primary-content/80">{{ intro }}</p>
    </div>
  </div>
</div>

<section class="py-16">
  <div class="container mx-auto px-4">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
      {{ collection:projects }}
      <div class="card bg-base-100 shadow-xl">
        <figure>
          <img src="{{ featured_image }}" alt="{{ title }}" class="w-full h-48 object-cover">
        </figure>
        <div class="card-body">
          <h2 class="card-title">{{ title }}</h2>
          <p>{{ excerpt }}</p>
          <div class="card-actions justify-between items-center">
            <div class="badge badge-primary">{{ client }}</div>
            <a href="{{ url }}" class="btn btn-primary btn-sm">View Project</a>
          </div>
        </div>
      </div>
      {{ /collection:projects }}
    </div>
  </div>
</section>
