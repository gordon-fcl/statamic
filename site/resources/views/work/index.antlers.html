<section class="py-20 relative">
  <div class="absolute inset-0 bg-gradient-to-br from-transparent via-[#2c5f7a]/5 to-transparent"></div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <h1 class="text-4xl font-bold mb-6 bg-gradient-to-r from-[#1a3e52] to-[#2c5f7a] bg-clip-text text-transparent">{{ title }}</h1>
    {{ if hero_subtitle }}
    <p class="text-xl text-gray-600 mb-12">{{ hero_subtitle }}</p>
    {{ /if }}
    
    <div class="grid md:grid-cols-2 gap-8 mt-12">
      {{ collection:projects }}
      <a href="{{ url }}" class="glass-dark p-8 rounded-2xl transition-smooth hover:scale-105 hover:shadow-2xl group block">
        <div class="flex items-start justify-between mb-4">
          <span class="text-sm font-medium text-[#2c5f7a]">{{ client_sector }}</span>
          <span class="text-sm text-gray-500">{{ project_role }}</span>
        </div>
        <h2 class="text-2xl font-semibold mb-3 group-hover:text-[#2c5f7a] transition-smooth">{{ title }}</h2>
        <p class="text-gray-600 mb-4 leading-relaxed">{{ excerpt }}</p>
        <div class="flex flex-wrap gap-2">
          {{ tech_stack }}
          <span class="text-xs px-3 py-1 rounded-full bg-[#1a3e52]/10 text-[#1a3e52]">{{ value }}</span>
          {{ /tech_stack }}
        </div>
      </a>
      {{ /collection:projects }}
    </div>
  </div>
</section>
